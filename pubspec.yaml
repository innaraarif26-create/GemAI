name: gemai
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

#-------------Packages--------------#
dependencies:
  flutter:
    sdk: flutter

  # Utility Packages

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # Product Specific

#--------------Packages End-------------#

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

#-----------Local Assets------------#
assets:
  - assets/images/
  - assets/logos/
  - assets/icons/
  - assets/pdfs/

#-----------Local Fonts------------#
fonts:
   - family: TimesRomanFont
     fonts:
       - asset: assets/fonts/times.ttf
       - asset: assets/fonts/times-bd.ttf
         weight: 800
       - asset: assets/fonts/times-bi.ttf
         weight: 800
         style: italic
       - asset: assets/fonts/times-i.ttf
         style: italic

  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
